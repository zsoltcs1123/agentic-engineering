[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "gateflow"
version = "0.1.0"
description = "Domain-agnostic quality-gated workflow orchestrator built on LangGraph"
requires-python = ">=3.14"
dependencies = [
    "langgraph>=0.4",
    "pydantic>=2.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/gateflow"]
